services:
  speedmonitor:
    build: .
    container_name: speedmonitor-lite
    ports:
      - "8000:8000"
    volumes:
      # Only persist the database, not the app code
      - speedtest_data:/code/data
    environment:
      - SPEEDTEST_INTERVAL_MINUTES=60
      - MANUAL_TEST_COOLDOWN_MINUTES=5
      - DB_PATH=/code/data/speedtest.db
    restart: unless-stopped

volumes:
  speedtest_data:
