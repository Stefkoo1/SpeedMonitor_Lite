<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedMonitor-Lite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-down: #22c55e;
            --accent-up: #3b82f6;
            --accent-ping: #a855f7;
            --btn-bg: #2563eb;
            --btn-hover: #1d4ed8;
        }

        body.light-mode {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --btn-bg: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: all 0.3s ease;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .theme-toggle {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            background: var(--card-bg);
            color: var(--text-main);
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .card .value {
            font-size: 3rem;
            font-weight: 700;
        }

        .download { color: var(--accent-down); }
        .upload { color: var(--accent-up); }
        .ping { color: var(--accent-ping); }

        .controls {
            margin-bottom: 2rem;
            text-align: center;
        }

        .btn {
            background: var(--btn-bg);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.25rem;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover { background: var(--btn-hover); }

        .chart-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 1000px;
            padding: 1.5rem;
            border-radius: 1rem;
            position: relative;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .csv-btn {
            background: #475569;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            text-decoration: none;
        }

        .last-update {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }
    </style>
</head>
<body class="dark-mode">

    <header>
        <h1>SpeedMonitor-Lite</h1>
        <button class="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
    </header>

    <div class="grid">
        <div class="card">
            <h3>Download</h3>
            <div class="value download">{{ latest.download }} <span style="font-size: 1.5rem">Mbps</span></div>
        </div>
        <div class="card">
            <h3>Upload</h3>
            <div class="value upload">{{ latest.upload }} <span style="font-size: 1.5rem">Mbps</span></div>
        </div>
        <div class="card">
            <h3>Latency</h3>
            <div class="value ping">{{ latest.ping }} <span style="font-size: 1.5rem">ms</span></div>
        </div>
    </div>

    <p class="last-update" style="margin-bottom: 1rem;">Last check: {{ latest.timestamp }}</p>

    <div class="controls">
        <form action="/run-test" method="post">
            <button type="submit" class="btn">Run Test Now</button>
        </form>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <h2>24h History</h2>
            <a href="/download" class="csv-btn">⬇️ Download CSV</a>
        </div>
        <canvas id="speedChart"></canvas>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            if (body.classList.contains('dark-mode')) {
                body.classList.replace('dark-mode', 'light-mode');
                btn.innerText = "🌙 Dark Mode";
            } else {
                body.classList.replace('light-mode', 'dark-mode');
                btn.innerText = "☀️ Light Mode";
            }
        }

        // DATEN-VERARBEITUNG OHNE ZEITZONEN-SHIFT
        const rawResults = [
            {% for result in results %}
            {
                time: "{{ result[1] }}",
                dl: {{ result[2] }},
                ul: {{ result[3] }}
            },
            {% endfor %}
        ];

        // Wir extrahieren die Uhrzeit direkt aus dem String
        const labels = rawResults.map(r => {
            const parts = r.time.split(' ');
            if (parts.length > 1) {
                const hms = parts[1].split(':');
                return hms[0] + ':' + hms[1]; // Gibt HH:MM zurück
            }
            return r.time;
        });

        const downloadData = rawResults.map(r => r.dl);
        const uploadData = rawResults.map(r => r.ul);

        const ctx = document.getElementById('speedChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Download',
                        data: downloadData,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: 'Upload',
                        data: uploadData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#94a3b8' } }
                },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8' }, beginAtZero: true }
                }
            }
        });
    </script>
</body>
</html>
